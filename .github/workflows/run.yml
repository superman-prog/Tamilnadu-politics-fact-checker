name: Automated Multi-Agent OSINT Engine

concurrency:
  group: osint-pipeline
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */2 * * *' # Runs automatically every 6 hours
  workflow_dispatch:      # 🚀 THIS ENABLES THE MANUAL LAYER
    inputs:
      manual_urls:
        description: 'Pasted YouTube video links from the UI front-end'
        required: false
        default: ''

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install groq google-genai requests

    - name: Run Scavenger Scout Engine
      if: success()
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_KEYS_STRING: ${{ secrets.GEMINI_KEYS_STRING }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python scout.py

    - name: Commit and Push Reports
      run: |
        git config --global user.name "Scavenger Scout Bot"
        git config --global user.email "actions@github.com"
        git add database.json reports/
        # Only commit if changes actually exist so it doesn't fail on empty diffs
        git diff-index --quiet HEAD || git commit -m "Automated OSINT Sweep: Added new reports & updated DB"
        
        # Pull down any concurrent commits from other runs to merge cleanly
        git pull --rebase origin main
        
        git push origin main
        
