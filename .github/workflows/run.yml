name: Automated Multi-Agent OSINT Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Executes automatically every 2 hours
  workflow_dispatch:     # Retains your manual "Run" action dashboard button

# 🚀 THE MAGIC FIX FOR THE 403 PUSH ERROR
permissions:
  contents: write

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository Source
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser groq google-genai

    - name: Execute Stealth Audit Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_KEYS_STRING: ${{ secrets.GEMINI_KEYS_STRING }}
      run: python scout.py

    # 🚀 INSTANT DOWNLOAD VAULT: Packages everything into a neat zip folder 
    - name: Upload Grounded Reports as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Scavenger-Reports-Archive
        path: |
          reports/
          database.json
        retention-days: 5

    - name: Commit and Push Grounded Reports
      run: |
        git config --global user.name "Scavenger Scout Bot"
        git config --global user.email "actions@github.com"
        
        # Safely adds the folder and file if they exist
        if [ -d "reports" ]; then git add reports/; fi
        if [ -f "database.json" ]; then git add -f database.json; fi
        
        # Pushes to your repo automatically
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ Scout Engine: Added new grounded forensic reports" && git push)
        
