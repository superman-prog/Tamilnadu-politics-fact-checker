name: Automated Multi-Agent OSINT Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install groq google-genai feedparser

    # 🚀 THE NEW SHIELD: This checks if YouTube is blocking the server IP
    - name: Verify YouTube Feed Clearance
      id: network_check
      run: |
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://www.youtube.com/feeds/videos.xml?channel_id=UCFzg1PqG9yXXSvcQ0F2-z4Q")
        echo "📡 Active IP Channel Status: $HTTP_STATUS"
        
        if [ "$HTTP_STATUS" -eq 404 ] || [ "$HTTP_STATUS" -eq 429 ]; then
          echo "🚨 YouTube has blacklisted this host IP. Force-failing container to cycle runners..."
          exit 1
        fi
        echo "✅ Connection clear. Ready for execution."

    - name: Run Scavenger Scout Engine
      if: success()
    env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_KEYS_STRING: ${{ secrets.GEMINI_KEYS_STRING }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # 🚀 Add this!
      run: python scout.py

    - name: Commit and Push Reports
      if: success()
      run: |
        git config --global user.name "Scavenger Scout Bot"
        git config --global user.email "scout-bot@github.com"
        git add reports/ database.json
        # Only commit if there are actual changes
        git commit -m "Automated OSINT Sweep: Added new reports & updated DB" || exit 0
        git push origin main
        
