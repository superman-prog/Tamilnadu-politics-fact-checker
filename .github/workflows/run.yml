name: Automated Multi-Agent OSINT Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install groq google-genai requests

    - name: Run Scavenger Scout Engine
      if: success()
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_KEYS_STRING: ${{ secrets.GEMINI_KEYS_STRING }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python scout.py

    - name: Commit and Push Reports
      if: success()
      run: |
        git config --global user.name "Scavenger Scout Bot"
        git config --global user.email "scout-bot@github.com"
        git add reports/ database.json
        # Only commit if there are actual changes
        git commit -m "Automated OSINT Sweep: Added new reports & updated DB" || exit 0
        git push origin main
        
