name: Automated Multi-Agent OSINT Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Executes automatically every 2 hours
  workflow_dispatch:     # Retains your manual "Run" action dashboard button

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository Source
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Fixed the typo here to remove the GitHub Actions warning
        cache: 'pip'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser groq google-genai

    - name: Execute Stealth Audit Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
        GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
        GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
        GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
        GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
        GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
        GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
        GEMINI_KEY_8: ${{ secrets.GEMINI_KEY_8 }}
        GEMINI_KEY_9: ${{ secrets.GEMINI_KEY_9 }}
        GEMINI_KEY_10: ${{ secrets.GEMINI_KEY_10 }}
      run: python scout.py

    - name: Commit and Push Grounded Reports
      run: |
        git config --global user.name "Scavenger Scout Bot"
        git config --global user.email "actions@github.com"
        git add reports/ database.json
        # Only commit if there are actual changes to prevent workflow crashes
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛰️ Scout Engine: Added new grounded forensic reports" && git push)
        
